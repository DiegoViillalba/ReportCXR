# ReportCXR — versioned hyperparameters
# All quantitative decisions logged here; never hardcoded in src/.

data:
  raw_dir: data/raw
  processed_dir: data/processed
  images_dir: data/raw/images
  reports_file: indiana_reports.csv
  projections_file: indiana_projections.csv

labels:
  uncertain_policy: present   # 'present' (U→1) | 'absent' (U→0, ablation)
  cache_path: data/processed/chexbert_labels.parquet
  device: cuda                 # 'cpu' for EDA; 'cuda' for batch runs

split:
  test_size: 0.15
  val_size: 0.10
  random_state: 42
  min_test_count: 600

model:
  base_model_id: google/medgemma-4b-it
  quantization: 4bit          # '4bit' (NF4 QLoRA) | '8bit'
  max_new_tokens: 256
  temperature: 0.0            # fixed for eval reproducibility (MedGemma 1.5 §3.1)

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  num_epochs: 2
  learning_rate: 5.0e-5
  warmup_ratio: 0.06
  weight_decay: 0.01
  max_seq_length: 512

sampler:
  weight_clip: 10.0           # max(w_i) / mean(w) cap
  p_target:
    # ESS > 250 — no correction needed (common enough)
    Enlarged Cardiomediastinum: null  # ESS=249, prev=7.5%
    Cardiomegaly: null                # ESS=414, prev=12.4%
    Lung Opacity: null                # ESS=450, prev=13.5%
    No Finding: null                  # ESS=1293, prev=38.7%
    # ESS 50–224 — moderate boost to ~10% target
    Atelectasis: 0.10                 # ESS=224, prev=6.7%  → 1.5x
    Support Devices: 0.10             # ESS=153, prev=4.6%  → 2.2x
    Lung Lesion: 0.10                 # ESS=134, prev=4.0%  → 2.5x
    Fracture: 0.10                    # ESS=121, prev=3.6%  → 2.8x
    Pleural Effusion: 0.10            # ESS=105, prev=3.1%  → 3.2x
    # ESS < 50 — aggressive boost to ~5% target
    Pleural Other: 0.05               # ESS=49,  prev=1.5%  → 3.4x
    Edema: 0.05                       # ESS=44,  prev=1.3%  → 3.8x
    Pneumonia: 0.05                   # ESS=30,  prev=0.9%  → 5.6x
    Consolidation: 0.05               # ESS=25,  prev=0.7%  → 7.1x
    Pneumothorax: 0.05                # ESS=17,  prev=0.5%  → 9.8x

eval:
  bertscore_model: microsoft/deberta-xlarge-mnli
  bleu_max_order: 4
  uncertain_policy_ablation: absent   # ablation: compare vs labels.uncertain_policy

acquisition_shift:
  perturbations: [brightness, contrast, gamma, gaussian_noise, jpeg_compression]
  seed: 42
  magnitudes:
    brightness: [0.5, 0.7, 1.0, 1.3, 1.6]
    contrast: [0.5, 0.7, 1.0, 1.5, 2.0]
    gamma: [0.5, 0.75, 1.0, 1.5, 2.0]
    gaussian_noise: [0.0, 5.0, 15.0, 30.0, 50.0]
    jpeg_compression: [95, 75, 50, 25, 10]

wandb:
  project: reportcxr
  entity: null                # set via WANDB_ENTITY env var
