project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    # Report pages
    - report/01_introduction.qmd
    - report/02_data.qmd
    - report/03_model_training.qmd
    - report/04_evaluation.qmd
    - report/05_inference_conditioning.qmd
    - report/06_domain_shift.qmd
    - report/07_production_scaling.qmd
    # Code Documentation pages
    - doc/architecture.qmd
    - doc/data_pipeline.qmd
    - doc/training_pipeline.qmd
    - doc/evaluation_modules.qmd
    - doc/domain_shift_modules.qmd
    # Notebooks
    - notebooks/01_eda.ipynb
    - notebooks/02_baseline_zero_shot.ipynb
    - notebooks/03_train_local.ipynb
    - notebooks/03_train_kaggle.ipynb
    - notebooks/04_eval_and_figures.ipynb
    - notebooks/05_rag_retrieval.ipynb
    - notebooks/06_association_rules.ipynb

execute:
  execute: false # Do not run notebook cells; convert them with their existing outputs

bibliography: references.bib

website:
  title: "ReportCXR"
  description: "Multimodal Clinical Report Generation & Domain Shift Audit"
  site-url: "https://diegovillaba.github.io/ReportCXR"
  repo-url: "https://github.com/diegovillaba/ReportCXR"
  repo-branch: main
  navbar:
    background: light
    collapse: true
    left:
      - text: "Overview"
        href: index.qmd
      - text: "Technical Report"
        menu:
          - text: "1. Introduction & Strategic Thesis"
            href: report/01_introduction.qmd
          - text: "2. Data Distribution & Sampler"
            href: report/02_data.qmd
          - text: "3. Model & QLoRA Config"
            href: report/03_model_training.qmd
          - text: "4. Evaluation & Metric Pivot"
            href: report/04_evaluation.qmd
          - text: "5. Inference Conditioning"
            href: report/05_inference_conditioning.qmd
          - text: "6. Domain Shift Audit Protocol"
            href: report/06_domain_shift.qmd
          - text: "7. Production Scaling"
            href: report/07_production_scaling.qmd
      - text: "Code Documentation"
        menu:
          - text: "Architecture Overview"
            href: doc/architecture.qmd
          - text: "Data Pipeline"
            href: doc/data_pipeline.qmd
          - text: "Model & Training"
            href: doc/training_pipeline.qmd
          - text: "Evaluation Modules"
            href: doc/evaluation_modules.qmd
          - text: "Domain Shift Audit"
            href: doc/domain_shift_modules.qmd
      - text: "Notebooks"
        menu:
          - text: "01: Exploratory Data Analysis"
            href: notebooks/01_eda.ipynb
          - text: "02: Zero-Shot Baseline"
            href: notebooks/02_baseline_zero_shot.ipynb
          - text: "03: Training (Local)"
            href: notebooks/03_train_local.ipynb
          - text: "03: Training (Kaggle)"
            href: notebooks/03_train_kaggle.ipynb
          - text: "04: Evaluation"
            href: notebooks/04_eval_and_figures.ipynb
          - text: "05: RAG Retrieval"
            href: notebooks/05_rag_retrieval.ipynb
          - text: "06: Association Rules"
            href: notebooks/06_association_rules.ipynb
  page-footer:
    left: "ReportCXR Technical Challenge"
    right: "Built with Quarto"

format:
  html:
    theme:
      - cosmo
      - custom.scss
    css: styles.css
    toc: true
    toc-depth: 3
    toc-expand: true
    code-fold: show
    code-tools: true
    highlight-style: github
